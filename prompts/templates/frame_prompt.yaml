name: framenet_goal_reasoning
version: 1.0
description: >
  Assign FrameNet frames and roles to objects given a goal.

input_variables:
  - goal
  - objects

prompt: |
  You are a semantic reasoning system using FrameNet.

  You MUST follow the output format exactly.
  If you do not follow the format, the answer is invalid.

  DO NOT:
  - write normal sentences outside the JSON
  - invent people like "John"
  - invent objects not in the allowed list
  - invent frames not in the allowed list
  - change field names
  - return anything except valid JSON


  Goal:
  {goal}

  Available objects:
  {objects}

  Allowed FrameNet frames and roles:

  - Arranging (ID: 921)
    Roles: Agent, Theme

  - Getting (ID: 179)
    Roles: Recipient, Theme, Source

  - Getting_scenario (ID: 1191)
    Roles: Recipient, Theme, Source

  - Locative_relation (ID: 199)
    Roles: Figure, Ground

  - Attempt_obtain_food_scenario (ID: 2007)
    Roles: Seeker, Food, Ground

  Instructions:
  1. Select only relevant objects for the goal.
  2. Assign them to appropriate FrameNet roles.
  3. Use only the frames listed above.
  4. Do NOT invent new objects or frames.
  5. Keep assignments realistic and logical.

  Output ONLY valid JSON in this format:

  {{
    "goal": "...",
    "relevant_objects": [...],
    "frames": [
      {{
        "frame": "...",
        "assignments": [
          {{"role": "...", "object": "..."}}
        ]
      }}
    ]
  }}

  {examples}

examples: |
  Example:

  Goal: have breakfast

  Output:
  {{
    "goal": "have breakfast",
    "relevant_objects": [
      "person",
      "banana",
      "bowl",
      "dining table",
      "refrigerator"
    ],
    "frames": [
      {{
        "frame": "Attempt_obtain_food_scenario",
        "assignments": [
          {{"role": "Seeker", "object": "person"}},
          {{"role": "Food", "object": "banana"}},
          {{"role": "Ground", "object": "refrigerator"}}
        ]
      }},
      {{
        "frame": "Getting_scenario",
        "assignments": [
          {{"role": "Recipient", "object": "person"}},
          {{"role": "Theme", "object": "banana"}},
          {{"role": "Source", "object": "refrigerator"}}
        ]
      }},
      {{
        "frame": "Arranging",
        "assignments": [
          {{"role": "Agent", "object": "person"}},
          {{"role": "Theme", "object": "banana"}}
        ]
      }},
      {{
        "frame": "Locative_relation",
        "assignments": [
          {{"role": "Figure", "object": "banana"}},
          {{"role": "Ground", "object": "bowl"}}
        ]
      }},
      {{
        "frame": "Locative_relation",
        "assignments": [
          {{"role": "Figure", "object": "bowl"}},
          {{"role": "Ground", "object": "dining table"}}
        ]
      }}
    ]
  }}